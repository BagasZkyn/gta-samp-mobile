name: Build Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-debug-windows:
    name: Assemble Debug APK (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache NDK & SDK components
        uses: actions/cache@v4.2.3
        with:
          path: |
            ${{ runner.tool_cache }}/ndk
            ${{ env.LOCALAPPDATA }}\Android\Sdk
          key: android-ndk-windows-26.2.11394342
          restore-keys: |
            android-ndk-windows-

      - name: Cache CMake build outputs
        uses: actions/cache@v4.2.3
        with:
          path: app/.cxx
          key: cmake-debug-windows-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            cmake-debug-windows-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: debug-apk-windows
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: debug-test-results-windows
          path: app/build/reports/tests/
          if-no-files-found: ignore

  build-release-windows:
    name: Assemble Release APK (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache NDK & SDK components
        uses: actions/cache@v4.2.3
        with:
          path: |
            ${{ runner.tool_cache }}/ndk
            ${{ env.LOCALAPPDATA }}\Android\Sdk
          key: android-ndk-windows-26.2.11394342
          restore-keys: |
            android-ndk-windows-

      - name: Cache CMake build outputs
        uses: actions/cache@v4.2.3
        with:
          path: app/.cxx
          key: cmake-release-windows-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            cmake-release-windows-

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --build-cache

      - name: Upload Release APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-apk-windows
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
