name: Build Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-release:
    name: Assemble Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache NDK & SDK components
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.tool_cache }}/ndk
            ~/.android/cache
          key: android-ndk-${{ runner.os }}-26.2.11394342
          restore-keys: |
            android-ndk-${{ runner.os }}-

      - name: Cache CMake build outputs
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cmake-release-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            cmake-release-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --build-cache

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
