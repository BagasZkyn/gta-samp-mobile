name: Build Debug

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-debug:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache NDK & SDK components
        uses: actions/cache@v4.2.3
        with:
          path: |
            ${{ runner.tool_cache }}/ndk
            ~/.android/cache
          key: android-ndk-${{ runner.os }}-26.2.11394342
          restore-keys: |
            android-ndk-${{ runner.os }}-

      - name: Cache CMake build outputs
        uses: actions/cache@v4.2.3
        with:
          path: app/.cxx
          key: cmake-debug-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            cmake-debug-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: debug-test-results
          path: app/build/reports/tests/
          if-no-files-found: ignore
